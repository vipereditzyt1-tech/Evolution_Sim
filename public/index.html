<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Evolution Simulation</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 0;\n        }\n        canvas {\n            border: 1px solid black;\n            display: block;\n            margin: auto;\n        }\n        #controls, #stats, #creature-inspector {\n            margin: 20px;\n            padding: 10px;\n            border: 1px solid #ccc;\n            border-radius: 5px;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="simulationCanvas" width="800" height="600"></canvas>\n    <div id="controls">\n        <h2>Controls</h2>\n        <button id="startButton">Start</button>\n        <button id="stopButton">Stop</button>\n        <button id="resetButton">Reset</button>\n    </div>\n    <div id="stats">\n        <h2>Statistics</h2>\n        <p id="populationCount">Population: 0</p>\n        <p id="averageHealth">Average Health: 0</p>\n    </div>\n    <div id="creature-inspector">\n        <h2>Creature Inspector</h2>\n        <p id="selectedCreature">Selected Creature: None</p>\n    </div>\n    <script>\n        const canvas = document.getElementById('simulationCanvas');\n        const ctx = canvas.getContext('2d');\n        let simulationActive = false;\n        let population = [];\n\n        function startSimulation() {\n            simulationActive = true;\n            // Start simulation logic here\n        }\n\n        function stopSimulation() {\n            simulationActive = false;\n            // Stop simulation logic here\n        }\n\n        function resetSimulation() {\n            population = [];\n            // Reset logic here\n            updateStats();\n        }\n\n        function updateStats() {\n            document.getElementById('populationCount').innerText = `Population: ${population.length}`;\n            // Calculate and update average health\n        }\n\n        document.getElementById('startButton').addEventListener('click', startSimulation);\n        document.getElementById('stopButton').addEventListener('click', stopSimulation);\n        document.getElementById('resetButton').addEventListener('click', resetSimulation);\n    </script>\n</body>\n</html>
